<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard do Jogador</title>
  <link rel="icon" type="image/png" href="../img/fav_rex.png" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div class="page-shell">
    <div class="card page-card">
      <div class="section-row">
        <div>
          <h1 class="hero-title">Dashboard do Jogador</h1>
          <div class="muted" id="dashboardSubtitle">Carregando...</div>
        </div>
        <div class="authbar-actions">
          <a id="goHomeBtn" class="button-link" href="../index.html">Início</a>
          <a id="goPlayerSheetBtn" class="button-link" href="./ficha.html">Minha ficha</a>
                    <a id="goAdminBtn" class="button-link" href="./admin.html" style="display:none;">Painel do mestre</a>
          <button id="logoutBtn" type="button">Sair</button>
        </div>
      </div>
      <div class="notice" id="dashboardStatus">Verificando dados...</div>
      <div class="cards-grid" id="dashboardCards"></div>
    </div>
  </div>

  <div id="createCreatureModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true">
      <h3>Nova criatura</h3>
      <div class="modal-grid">
        <div>
          <label for="newCreatureName">Nome</label>
          <input id="newCreatureName" type="text" placeholder="Nome da criatura" />
        </div>
        <div>
          <label for="newCreatureTemplate">Espécie / template</label>
          <div class="custom-select" data-for="newCreatureTemplate">
            <select class="select-hidden-native" data-placeholder="Selecione um template" id="newCreatureTemplate"></select>
            <button class="custom-select-trigger" type="button">Selecione um template</button>
            <div class="custom-select-menu"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" id="cancelCreateCreatureBtn">Cancelar</button>
        <button type="button" id="confirmCreateCreatureBtn">Criar criatura</button>
      </div>
    </div>
  </div>

  <div id="transferCreatureModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true">
      <h3>Transferir criatura</h3>
      <div class="footer-note">Escolha o novo dono.</div>
      <div class="modal-grid">
        <div>
          <label for="transferTargetUser">Novo dono</label>
          <div class="custom-select" data-for="transferTargetUser">
            <select class="select-hidden-native" data-placeholder="Selecione um usuário" id="transferTargetUser"></select>
            <button class="custom-select-trigger" type="button">Selecione um usuário</button>
            <div class="custom-select-menu"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" id="cancelTransferCreatureBtn">Cancelar</button>
        <button type="button" id="confirmTransferCreatureBtn">Transferir</button>
      </div>
    </div>
  </div>

  <script type="module" src="../assets/js/dashboard.js"></script>
</body>
</html>
