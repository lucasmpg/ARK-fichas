<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard do Jogador</title>
  <link rel="icon" type="image/png" href="../img/fav_rex.png" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div class="dashboard-shell">
    <header class="dashboard-topbar">
      <img class="topbar-frame" src="../img/top_bar.png" alt="" aria-hidden="true" />

      <div class="topbar-content">
        <div class="brand-side">
          <img class="brand-logo" src="../img/fav_rex.png" alt="ARK" />
        </div>

        <div class="title-side">
          <h1 class="hero-title">Dashboard do Jogador</h1>
          <div class="muted top-subtitle" id="dashboardSubtitle">Carregando...</div>
        </div>

        <nav class="authbar-actions" aria-label="Ações do dashboard">
          <a id="goPlayerSheetBtn" class="asset-button asset-button-top" href="./ficha.html">
            <span>Minha Ficha</span>
          </a>
          <a id="goAdminBtn" class="asset-button asset-button-top" href="./admin.html" style="display:none;">
            <span>Painel do Mestre</span>
          </a>
          <button id="logoutBtn" class="asset-button asset-button-red asset-button-top" type="button">
            <span>Sair</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="dashboard-stage">
      <section class="workspace-line">
        <div class="workspace-status" id="dashboardStatus">Verificando dados...</div>
      </section>

      <section class="top-cards-grid" id="dashboardTopCards"></section>

      <section class="creatures-section">
        <div class="section-heading">
          <img class="section-heading-frame" src="../img/section_sep.png" alt="" aria-hidden="true" />
          <h2>Minhas Criaturas</h2>
        </div>

        <div class="creature-list" id="dashboardCreatureList"></div>
      </section>
    </main>
  </div>

  <div id="createCreatureModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true">
      <h3>Nova criatura</h3>
      <div class="modal-grid">
        <div>
          <label for="newCreatureName">Nome</label>
          <input id="newCreatureName" type="text" placeholder="Nome da criatura" />
        </div>
        <div>
          <label for="newCreatureTemplate">Espécie / template</label>
          <div class="custom-select" data-for="newCreatureTemplate">
            <select class="select-hidden-native" data-placeholder="Selecione um template" id="newCreatureTemplate"></select>
            <button class="custom-select-trigger" type="button">Selecione um template</button>
            <div class="custom-select-menu"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="asset-button asset-button-red" type="button" id="cancelCreateCreatureBtn"><span>Cancelar</span></button>
        <button class="asset-button asset-button-green" type="button" id="confirmCreateCreatureBtn"><span>Criar criatura</span></button>
      </div>
    </div>
  </div>

  <div id="transferCreatureModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true">
      <h3>Transferir criatura</h3>
      <div class="footer-note">Escolha o novo dono.</div>
      <div class="modal-grid">
        <div>
          <label for="transferTargetUser">Novo dono</label>
          <div class="custom-select" data-for="transferTargetUser">
            <select class="select-hidden-native" data-placeholder="Selecione um usuário" id="transferTargetUser"></select>
            <button class="custom-select-trigger" type="button">Selecione um usuário</button>
            <div class="custom-select-menu"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="asset-button asset-button-red" type="button" id="cancelTransferCreatureBtn"><span>Cancelar</span></button>
        <button class="asset-button asset-button-orange" type="button" id="confirmTransferCreatureBtn"><span>Transferir</span></button>
      </div>
    </div>
  </div>

  <script type="module" src="../assets/js/dashboard.js"></script>
</body>
</html>
