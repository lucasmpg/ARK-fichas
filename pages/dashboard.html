<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard do Jogador</title>
  <link rel="icon" type="image/png" href="../img/fav_rex.png" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <div class="dashboard-shell">
    <header class="hud-topbar">
      <div class="hud-topbar-frame" aria-hidden="true"></div>
      <div class="hud-topbar-inner">
        <div class="hud-brand">
          <img class="hud-brand-logo" src="../img/fav_rex.png" alt="Logo" />
          <div>
            <h1 class="hero-title">Dashboard do Jogador</h1>
            <div class="hud-subtitle" id="dashboardSubtitle">Carregando...</div>
          </div>
        </div>

        <nav class="hud-actions" aria-label="Ações do dashboard">
          <a id="goPlayerSheetBtn" class="ark-btn ark-btn-blue" href="./ficha.html">
            <span>Minha ficha</span>
          </a>
          <a id="goAdminBtn" class="ark-btn ark-btn-orange" href="./admin.html" style="display:none;">
            <span>Painel do mestre</span>
          </a>
          <button id="logoutBtn" class="ark-btn ark-btn-red" type="button">
            <span>Sair</span>
          </button>
        </nav>
      </div>
    </header>

    <section class="status-strip">
      <div class="status-chip" id="dashboardStatus">Verificando dados...</div>
    </section>

    <section class="top-grid" id="dashboardTopCards" aria-label="Resumo do dashboard"></section>

    <section class="creatures-section">
      <div class="section-heading">
        <div class="section-heading-line" aria-hidden="true"></div>
        <h2>Minhas Criaturas</h2>
      </div>
      <div class="creature-list" id="dashboardCreatureList"></div>
    </section>
  </div>

  <div id="createCreatureModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="createCreatureTitle">
      <h3 id="createCreatureTitle">Nova criatura</h3>
      <div class="modal-grid">
        <div>
          <label for="newCreatureName">Nome</label>
          <input id="newCreatureName" type="text" placeholder="Nome da criatura" />
        </div>
        <div>
          <label for="newCreatureTemplate">Espécie / template</label>
          <div class="custom-select" data-for="newCreatureTemplate">
            <select class="select-hidden-native" data-placeholder="Selecione um template" id="newCreatureTemplate"></select>
            <button class="custom-select-trigger" type="button">Selecione um template</button>
            <div class="custom-select-menu"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="ark-btn ark-btn-orange" id="cancelCreateCreatureBtn"><span>Cancelar</span></button>
        <button type="button" class="ark-btn ark-btn-green" id="confirmCreateCreatureBtn"><span>Criar criatura</span></button>
      </div>
    </div>
  </div>

  <div id="transferCreatureModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="transferCreatureTitle">
      <h3 id="transferCreatureTitle">Transferir criatura</h3>
      <div class="footer-note">Escolha o novo dono.</div>
      <div class="modal-grid modal-grid-single">
        <div>
          <label for="transferTargetUser">Novo dono</label>
          <div class="custom-select" data-for="transferTargetUser">
            <select class="select-hidden-native" data-placeholder="Selecione um usuário" id="transferTargetUser"></select>
            <button class="custom-select-trigger" type="button">Selecione um usuário</button>
            <div class="custom-select-menu"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="ark-btn ark-btn-orange" id="cancelTransferCreatureBtn"><span>Cancelar</span></button>
        <button type="button" class="ark-btn ark-btn-blue" id="confirmTransferCreatureBtn"><span>Transferir</span></button>
      </div>
    </div>
  </div>

  <script type="module" src="../assets/js/dashboard.js"></script>
</body>
</html>
