<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./img/fav_rex.png" />
  <link rel="stylesheet" href="./assets/css/index.css" />
</head>
<body>
  <main class="login-screen">
    <img class="login-logo" src="./img/dino_logo.png" alt="Dinossauro ARK" />

    <div class="login-status" id="userInfo">Verificando autenticação...</div>

    <div class="login-actions">
      <button id="loginGoogleBtn" class="google-login-btn" type="button">
        <img class="google-logo" src="./img/google_logo.png" alt="" />
        <span>Continue com Google</span>
      </button>

      <button id="logoutBtn" type="button" style="display:none;">Sair</button>

      <a id="openFichaBtn" class="button-link" href="./pages/dashboard.html" style="display:none;">
        Abrir dashboard
      </a>

      <a id="openAdminBtn" class="button-link" href="./pages/admin.html" style="display:none;">
        Painel do mestre
      </a>
    </div>
  </main>

  <script type="module">
    import { bindLandingAuth } from "./assets/js/auth.js";
    bindLandingAuth();
  </script>
</body>
</html>
