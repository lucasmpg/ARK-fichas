<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARK Fichas Online</title>
  <link rel="stylesheet" href="./assets/css/index.css" />
  <link rel="stylesheet" href="./assets/css/common.css" />
</head>
<body>
  <div class="page-shell">
    <div class="center-card card">
      <h1 class="hero-title">ARK Fichas Online</h1>
      <p class="hero-subtitle">Login com Google para cada player usar a própria ficha.</p>
      <div class="notice" id="userInfo">Verificando autenticação...</div>
      <div class="page-actions">
        <button id="loginGoogleBtn" type="button">Entrar com Google</button>
        <button id="logoutBtn" type="button" style="display:none;">Sair</button>
        <button id="openFichaBtn" type="button" style="display:none;">Abrir dashboard</button>
        <button id="openAdminBtn" type="button" style="display:none;">Painel do mestre</button>
    </div>
  </div>
  <script type="module">
    import { bindLandingAuth } from "./assets/js/auth.js";
    bindLandingAuth();
  </script>
</body>
</html>
