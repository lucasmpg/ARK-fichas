<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./img/fav_rex.png" />
  <link rel="stylesheet" href="./assets/css/index.css" />
  <link rel="stylesheet" href="./assets/css/common.css" />
</head>
<body>
  <div class="page-shell login-shell">
    <div class="center-card card login-card">
      <div class="login-hero">
        <img class="login-logo" src="./img/dino_logo.png" alt="Dinossauro ARK" />
      </div>
      <div class="notice" id="userInfo">Verificando autenticação...</div>
      <div class="page-actions login-actions">
        <button id="loginGoogleBtn" class="google-login-btn" type="button">
          <img class="google-logo" src="./img/google_logo.png" alt="" />
          <span>Continue com Google</span>
        </button>
        <button id="logoutBtn" type="button" style="display:none;">Sair</button>
        <a id="openFichaBtn" class="button-link" href="./pages/dashboard.html" style="display:none;">Abrir dashboard</a>
        <a id="openAdminBtn" class="button-link" href="./pages/admin.html" style="display:none;">Painel do mestre</a>
      </div>
    </div>
  </div>
  <script type="module">
    import { bindLandingAuth } from "./assets/js/auth.js";
    bindLandingAuth();
  </script>
</body>
</html>
